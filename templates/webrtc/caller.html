<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebRTC Caller</title>
  {% load static %}
<script src="{% static 'js/jssip.min.js' %}"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 40px 36px;
      width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    .subtitle { font-size: 12px; color: #64748b; margin-top: 2px; }

    .status-bar {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.registered { background: #22c55e; }
    .dot.incall     { background: #6366f1; animation: pulse 0.8s infinite; }
    .dot.error      { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px 14px;
      color: #f1f5f9;
      font-size: 20px;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 8px;
    }

    input[type="text"]:focus { border-color: #6366f1; }
    input[type="text"]::placeholder { color: #334155; font-size: 16px; letter-spacing: 1px; }

    .converted {
      font-size: 12px;
      color: #6366f1;
      margin-bottom: 20px;
      min-height: 18px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-call {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }
    .btn-call:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-call:disabled { background: #1e2433; color: #475569; cursor: not-allowed; transform: none; filter: none; }

    .btn-hangup {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      display: none;
    }
    .btn-hangup:hover { filter: brightness(1.1); }

    .btn-connect {
      background: #1e2433;
      color: #94a3b8;
      border: 1px solid #2d3148;
      margin-bottom: 12px;
      font-size: 13px;
      padding: 10px;
    }
    .btn-connect:hover { border-color: #6366f1; color: #6366f1; }
    .btn-connect.active { background: #1e1a33; border-color: #6366f1; color: #818cf8; }

    .timer {
      text-align: center;
      font-size: 28px;
      font-weight: 300;
      color: #6366f1;
      letter-spacing: 3px;
      margin: 16px 0;
      display: none;
      font-variant-numeric: tabular-nums;
    }

    audio { display: none; }

    .divider {
      border: none;
      border-top: 1px solid #2d3148;
      margin: 20px 0;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">📞</div>
    <div>
      <h1>WebRTC Caller</h1>
      <div class="subtitle">SIP over WebSocket</div>
    </div>
  </div>

  <!-- SIP Status -->
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">Chưa kết nối</span>
  </div>

  <!-- Connect button -->
  <button class="btn btn-connect" id="btnConnect" onclick="connectSIP()">
    🔌 Kết nối SIP
  </button>

  <hr class="divider"/>

  <!-- Phone input -->
  <label for="phoneInput">Số điện thoại</label>
  <input type="text" id="phoneInput" placeholder="090xxxxxxx" maxlength="15"
         oninput="onPhoneInput(this.value)" />
  <div class="converted" id="converted"></div>

  <!-- Call timer -->
  <div class="timer" id="timer">00:00</div>

  <!-- Buttons -->
  <button class="btn btn-call" id="btnCall" onclick="makeCall()" disabled>
    📞 Gọi
  </button>
  <button class="btn btn-hangup" id="btnHangup" onclick="hangup()">
    📵 Cúp máy
  </button>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
// ── SIP CONFIG ──────────────────────────────────────────────
const SIP_USER   = '{{ sip.user }}';
const SIP_PASS   = '{{ sip.password }}';
const SIP_SERVER = '{{ sip.server }}';
const WSS_URL    = '{{ sip.wss_url }}';
const DISPLAY    = '{{ sip.display_name }}';
// ────────────────────────────────────────────────────────────

let ua = null;
let currentSession = null;
let timerInterval = null;
let timerSeconds = 0;

// Convert số VN: 0xx → 84xx
function convertPhone(raw) {
  const digits = raw.replace(/\D/g, '');
  if (digits.startsWith('0') && digits.length >= 9) {
    return '84' + digits.slice(1);
  }
  return digits;
}

function onPhoneInput(val) {
  const converted = convertPhone(val);
  const el = document.getElementById('converted');
  if (converted && converted !== val.replace(/\D/g,'')) {
    el.textContent = '→ Sẽ gọi: ' + converted;
  } else {
    el.textContent = '';
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  dot.className = 'dot ' + state;
  statusText.textContent = text;
}

function connectSIP() {
  const btn = document.getElementById('btnConnect');
  if (ua && ua.isRegistered()) {
    ua.stop();
    ua = null;
    btn.classList.remove('active');
    btn.textContent = '🔌 Kết nối SIP';
    setStatus('', 'Đã ngắt kết nối');
    document.getElementById('btnCall').disabled = true;
    return;
  }

  setStatus('connecting', 'Đang kết nối...');
  btn.textContent = '⏳ Đang kết nối...';
  btn.disabled = true;

  const socket = new JsSIP.WebSocketInterface(WSS_URL);
  const config = {
    sockets: [socket],
    uri: `sip:${SIP_USER}@${SIP_SERVER}`,
    password: SIP_PASS,
    register: true,
    session_timers: false,
  };

  ua = new JsSIP.UA(config);

  ua.on('registered', () => {
    setStatus('registered', 'Đã đăng ký SIP ✓');
    btn.textContent = '✅ Đã kết nối (click để ngắt)';
    btn.classList.add('active');
    btn.disabled = false;
    document.getElementById('btnCall').disabled = false;
  });

  ua.on('registrationFailed', (e) => {
    setStatus('error', 'Đăng ký thất bại: ' + (e.cause || ''));
    btn.textContent = '🔌 Thử lại';
    btn.disabled = false;
  });

  ua.on('unregistered', () => {
    setStatus('', 'Chưa đăng ký');
    document.getElementById('btnCall').disabled = true;
  });

  ua.start();
}

function makeCall() {
  const raw = document.getElementById('phoneInput').value.trim();
  if (!raw) return;

  const target = convertPhone(raw);
  const callURI = `sip:${target}@${SIP_SERVER}`;

  const options = {
    mediaConstraints: { audio: true, video: false },
    pcConfig: { iceServers: [] },
  };

  currentSession = ua.call(callURI, options);

  currentSession.on('connecting', () => setStatus('connecting', 'Đang kết nối cuộc gọi...'));
  currentSession.on('progress',   () => setStatus('connecting', 'Đang đổ chuông... (' + target + ')'));
  currentSession.on('accepted',   () => {
    setStatus('incall', 'Đang trong cuộc gọi (' + target + ')');
    showInCall();
    startTimer();
  });
  currentSession.on('confirmed',  () => {
    setStatus('incall', 'Đang trong cuộc gọi (' + target + ')');
    showInCall();
    startTimer();
  });
  currentSession.on('ended',      () => onCallEnded('Cuộc gọi kết thúc'));
  currentSession.on('failed',     (e) => onCallEnded('Gọi thất bại: ' + (e.cause || '')));

  currentSession.connection?.addEventListener('track', (e) => {
    const audio = document.getElementById('remoteAudio');
    if (e.streams[0]) audio.srcObject = e.streams[0];
  });

  showInCall(true); // show hangup immediately
}

function hangup() {
  if (currentSession) {
    try { currentSession.terminate(); } catch(e) {}
  }
}

function onCallEnded(msg) {
  setStatus('registered', 'Đã đăng ký SIP ✓');
  stopTimer();
  showIdle();
  document.getElementById('remoteAudio').srcObject = null;
}

function showInCall(ringing = false) {
  document.getElementById('btnCall').style.display = 'none';
  document.getElementById('btnHangup').style.display = 'flex';
  if (!ringing) document.getElementById('timer').style.display = 'block';
}

function showIdle() {
  document.getElementById('btnCall').style.display = 'flex';
  document.getElementById('btnHangup').style.display = 'none';
  document.getElementById('timer').style.display = 'none';
  document.getElementById('timer').textContent = '00:00';
}

function startTimer() {
  timerSeconds = 0;
  document.getElementById('timer').style.display = 'block';
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
    const s = String(timerSeconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}
</script>
</body>
</html>
